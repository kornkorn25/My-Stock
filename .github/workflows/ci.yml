name: CI

# Runs typecheck, tests, and a build on every push and PR. This is a guard
# before Render auto-deploys main, not a deploy step.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # Server: prisma generate + typecheck (via build) and unit tests.
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Build server (prisma generate + tsc)
        working-directory: server
        run: npm run build
      - name: Run server tests
        working-directory: server
        run: npm test

      # Client: typecheck + production build.
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Build client (typecheck + vite build)
        working-directory: client
        run: npm run build
